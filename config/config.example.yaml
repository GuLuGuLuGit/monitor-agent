server:
  url: "http://localhost:8080"
  timeout: 30

device:
  # data_dir defaults to ~/.openclaw/
  data_dir: ""
  id_file: ""
  api_key_file: ""

# Command transport: "mqtt" (recommended) or "redis" (legacy fallback)
transport:
  type: mqtt
  mqtt:
    broker: "tcp://your-server:1883"
    keep_alive: 60
    clean_session: false
    auto_reconnect: true
    reconnect_interval: 5

# Redis (only needed if transport.type = redis)
redis:
  addr: "localhost:6379"
  password: ""
  db: 0

intervals:
  heartbeat: 60
  metrics: 30
  skills: 300
  log_upload: 60

metrics:
  batch_size: 10

skills:
  scan_paths:
    - "~/.openclaw/skills"
    - "~/Library/Application Support/OpenClaw/skills"
    - "/usr/local/openclaw/skills"

logs:
  level: "INFO"
  file: ""
  max_size: 100
  max_backups: 3
  batch_size: 100

cache:
  dir: ""
  max_size_mb: 50

retry:
  max_attempts: 5
  initial_interval: 1
  max_interval: 30

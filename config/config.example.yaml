server:
  url: "http://localhost:8080"
  timeout: 30

device:
  id_file: ""
  api_key_file: ""

intervals:
  heartbeat: 60
  metrics: 30
  skills: 300
  log_upload: 60

metrics:
  batch_size: 10

skills:
  scan_paths:
    - "~/Library/Application Support/OpenClaw/skills"
    - "/usr/local/openclaw/skills"

logs:
  level: "INFO"
  file: ""
  max_size: 100
  max_backups: 3
  batch_size: 100

cache:
  dir: ""
  max_size_mb: 50

retry:
  max_attempts: 5
  initial_interval: 1
  max_interval: 30
